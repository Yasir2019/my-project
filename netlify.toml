# Netlify Configuration for HTML5 Browser Game

# Build settings - Static deployment (no build required)
[build]
publish = "."
# No build command needed for pure HTML5 games

# Development settings
[dev]
command = "npx http-server"
port = 8080
publish = "."
autoLaunch = false

# Redirects - Single Page Application (SPA) configuration
# All routes redirect to index.html for client-side routing
[[redirects]]
from = "/*"
to = "/index.html"
status = 200

# Headers for optimal game performance and security
[[headers]]
for = "/*"
[headers.values]
# Cache control for dynamic content
Cache-Control = "public, max-age=3600"
# Security headers
X-Frame-Options = "SAMEORIGIN"
X-Content-Type-Options = "nosniff"
X-XSS-Protection = "1; mode=block"
Referrer-Policy = "no-referrer-when-downgrade"
Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Cache strategy for game assets (sprites, sounds, fonts)
[[headers]]
for = "/assets/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

# Cache for scripts
[[headers]]
for = "*.js"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

# Cache for stylesheets
[[headers]]
for = "*.css"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

# No cache for HTML (always check for updates)
[[headers]]
for = "/*.html"
[headers.values]
Cache-Control = "no-cache, no-store, must-revalidate"
Pragma = "no-cache"
Expires = "0"

# Enable GZIP compression for better performance
[[headers]]
for = "/*"
[headers.values]
Content-Encoding = "gzip"

# HTTP/2 Server Push for faster loading (optional)
# [[headers]]
# for = "/"
# [headers.values]
